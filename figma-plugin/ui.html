<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: var(--figma-color-bg, #fff);
        --bg2: var(--figma-color-bg-secondary, #f5f7fa);
        --text: var(--figma-color-text, #1a1a1a);
        --dim: var(--figma-color-text-secondary, #8a8f98);
        --border: var(--figma-color-border, #e6e8eb);
        --danger: var(--figma-color-text-danger, #e03e1a);
        --ok: var(--figma-color-text-success, #1e944a);
        --cova: #0a3aa8;
        --cova-2: #3b89ff;
        --radius: 9px;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font: 15px/1.55 Inter, -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--text); background: var(--bg);
        display: flex; flex-direction: column; height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      .hidden { display: none !important; }
      .logo { display: block; color: currentColor; }

      label { display: block; font-size: 13px; font-weight: 500; color: var(--dim); margin: 16px 0 7px; }
      input {
        width: 100%; height: 44px; padding: 0 13px;
        border: 1px solid var(--border); border-radius: var(--radius);
        background: var(--bg); color: var(--text); font: inherit;
      }
      input::placeholder { color: var(--dim); }
      input:focus { outline: none; border-color: var(--cova-2); box-shadow: 0 0 0 3px rgba(59, 137, 255, 0.18); }

      button {
        height: 44px; padding: 0 18px; border: 0; border-radius: var(--radius);
        background: var(--cova);
        color: #fff; font: inherit; font-weight: 600; cursor: pointer;
        transition: filter 0.12s, opacity 0.12s;
      }
      button:hover:not(:disabled) { filter: brightness(1.12); }
      button:disabled { opacity: 0.4; cursor: default; }
      button.ghost { background: none; color: var(--dim); font-weight: 500; }
      button.ghost:hover:not(:disabled) { color: var(--text); filter: none; }
      button.sm { height: 34px; padding: 0 13px; font-size: 13px; }
      .err { color: var(--danger); margin-top: 12px; min-height: 18px; font-size: 13px; }

      /* ---- login ---- */
      .hero {
        padding: 36px 26px 32px;
        color: #fff;
        background-color: #0a3aa8;
        background-image: radial-gradient(at 22% 18%, #3b89ff 0, transparent 55%),
          radial-gradient(at 82% 88%, #082567 0, transparent 55%);
      }
      .hero .logo { height: 32px; }
      .hero .tag {
        margin-top: 15px; font-size: 12px; font-weight: 600;
        letter-spacing: 0.13em; text-transform: uppercase; color: rgba(255, 255, 255, 0.65);
      }
      .hero .desc { margin-top: 11px; font-size: 14px; line-height: 1.6; color: rgba(255, 255, 255, 0.9); }
      .loginbody { padding: 6px 26px 26px; }
      .loginbody button { width: 100%; margin-top: 24px; height: 48px; font-size: 15px; }
      .signup { margin-top: 18px; text-align: center; font-size: 13px; color: var(--dim); }
      .signup a { color: var(--cova-2); font-weight: 600; text-decoration: none; cursor: pointer; }
      .signup a:hover { text-decoration: underline; }

      /* ---- app shell ---- */
      header {
        display: flex; align-items: center; gap: 12px;
        padding: 14px 16px; border-bottom: 1px solid var(--border);
      }
      header .logo { height: 18px; flex: none; }
      header .who { flex: 1; min-width: 0; text-align: right; }
      header .who .name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .vbar { width: 1px; height: 20px; background: var(--border); flex: none; }
      .warn { background: rgba(224, 62, 26, 0.1); color: var(--danger); padding: 10px 16px; font-size: 13px; }

      .selbar {
        padding: 13px 16px; font-size: 13.5px; color: var(--dim);
        background: var(--bg2); border-bottom: 1px solid var(--border);
      }
      .selbar.has { color: var(--text); font-weight: 500; }

      .tabs { display: flex; padding: 0 16px; border-bottom: 1px solid var(--border); }
      .tabs button {
        flex: 1; background: none; color: var(--dim); font-weight: 500; font-size: 14px;
        border-bottom: 2px solid transparent; border-radius: 0; height: 48px;
      }
      .tabs button:hover:not(.active) { color: var(--text); filter: none; }
      .tabs button.active { color: var(--cova-2); border-bottom-color: var(--cova-2); }

      .view { flex: 1; overflow: auto; padding: 18px; }
      #viewNew button { width: 100%; margin-top: 20px; }

      .toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
      .toolbar input { flex: 1; }
      .count { color: var(--dim); margin-bottom: 10px; font-size: 13px; }
      .item {
        display: flex; align-items: center; gap: 12px;
        padding: 15px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 11px;
        background: var(--bg);
      }
      .item .info { flex: 1; min-width: 0; }
      .item .title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .item .meta { color: var(--dim); font-size: 13px; margin-top: 3px; }
      .item.clickable { cursor: pointer; transition: border-color 0.12s, background 0.12s; }
      .item.clickable:hover { border-color: var(--cova-2); background: var(--bg2); }
      .item .chev { color: var(--dim); font-size: 22px; flex: none; }
      .empty, .loading { color: var(--dim); text-align: center; padding: 40px 0; font-size: 14px; }

      .detailhead { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
      .detailhead .detailtitle {
        flex: 1; min-width: 0; font-weight: 600; font-size: 16px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      #addVariantBtn {
        width: 100%; margin-top: 6px; background: none; color: var(--cova-2);
        border: 1px dashed var(--border); font-weight: 600;
      }
      #addVariantBtn:hover:not(:disabled) { border-color: var(--cova-2); background: var(--bg2); filter: none; }

      .hint { color: var(--dim); font-size: 13px; margin-bottom: 14px; }
      .page {
        display: flex; align-items: center; gap: 13px;
        padding: 12px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 11px;
      }
      .page img {
        width: 58px; height: 58px; object-fit: cover; border-radius: 8px;
        background: var(--bg2); border: 1px solid var(--border); flex: none;
      }
      .page .info { flex: 1; min-width: 0; }
      .page .info .title { font-weight: 600; }
      .page .info .meta { color: var(--dim); font-size: 13px; }

      .statusbar {
        display: flex; align-items: center; gap: 8px;
        padding: 12px 16px; border-top: 1px solid var(--border); min-height: 42px;
      }
      .status { flex: 1; font-size: 13px; color: var(--dim); }
      .status.err { color: var(--danger); }
      .status.ok { color: var(--ok); }
    </style>
  </head>
  <body>
    <!-- cova 로고(워드마크) — 재사용용 심볼 -->

    <!-- 로그인 -->
    <section id="login">
      <div class="hero">
        <svg class="logo" viewBox="0 0 103 25" width="124" height="30"><use href="#covaLogo" /></svg>
        <div class="tag">UXIS Co-view Area</div>
      </div>
      <div class="loginbody">
        <label for="email">이메일</label>
        <input id="email" type="email" autocomplete="username" placeholder="you@example.com" />

        <label for="password">비밀번호</label>
        <input id="password" type="password" autocomplete="current-password" />

        <button id="loginBtn">로그인</button>
        <div class="err" id="loginErr"></div>

        <div class="signup">계정이 없으신가요? <a id="signupLink" href="#">회원가입</a></div>
      </div>
    </section>

    <!-- 앱 (로그인 후) -->
    <section id="app" class="hidden" style="display: contents">
      <header>
        <svg class="logo" viewBox="0 0 103 25" width="66" height="16"><use href="#covaLogo" /></svg>
        <div class="who"><div class="name" id="userName"></div></div>
        <span class="vbar"></span>
        <button class="ghost sm" id="logoutBtn">로그아웃</button>
      </header>
      <div class="warn hidden" id="roleWarn">편집 권한이 없는 계정입니다. 업로드가 막힙니다.</div>

      <div class="selbar" id="selbar">Figma에서 올릴 프레임을 선택하세요</div>

      <div class="tabs">
        <button id="tabNewBtn" class="active">새 시안</button>
        <button id="tabExistingBtn">기존 시안에 새 버전</button>
      </div>

      <!-- 새 시안 -->
      <div class="view" id="viewNew">
        <label for="title">제목</label>
        <input id="title" placeholder="시안 제목" />
        <button id="createBtn" disabled>선택한 프레임으로 새 시안 만들기</button>
      </div>

      <!-- 기존 시안 → 안(variant) → 새 버전 -->
      <div class="view hidden" id="viewExisting">
        <!-- 시안 목록 -->
        <div id="listView">
          <div class="toolbar">
            <input id="search" placeholder="시안 검색…" />
            <button class="ghost sm" id="refreshBtn">새로고침</button>
          </div>
          <div class="count" id="count"></div>
          <div id="list"></div>
        </div>
        <!-- 시안 상세: 안 목록 -->
        <div id="detailView" class="hidden">
          <div class="detailhead">
            <button class="ghost sm" id="backBtn">← 목록</button>
            <div class="detailtitle" id="detailTitle"></div>
          </div>
          <div id="variants"></div>
          <button class="sm needsSel" id="addVariantBtn" disabled>＋ 새 안 추가 (선택 프레임)</button>
        </div>
        <!-- 안 상세: 페이지(이미지) 목록 -->
        <div id="pagesView" class="hidden">
          <div class="detailhead">
            <button class="ghost sm" id="pagesBackBtn">← 안 목록</button>
            <div class="detailtitle" id="pagesTitle"></div>
          </div>
          <div class="hint">교체는 캔버스에서 선택한 첫 프레임을 사용합니다.</div>
          <div id="pages"></div>
        </div>
      </div>

      <div class="statusbar">
        <div class="status" id="status"></div>
        <button class="sm hidden" id="openBtn">관리화면 열기 ↗</button>
      </div>
    </section>

    <script>
      // ---- 메인(샌드박스)과의 통신 ----
      function toMain(msg) {
        parent.postMessage({ pluginMessage: msg }, "*");
      }
      var $ = function (id) {
        return document.getElementById(id);
      };

      // cova 서버 주소. 개발: http://localhost:3000 / 배포 시 운영 도메인으로 변경.
      var API_BASE = "http://localhost:3000";

      // ---- 세션 상태 (메인의 clientStorage 에 영속) ----
      var config = { accessToken: null, refreshToken: null, expiresAt: null, user: null };
      function persist() {
        toMain({ type: "save-session", session: config });
      }

      var selectionCount = 0;
      var busy = false;
      var listLoaded = false;
      var pendingExport = null;
      var lastProposalId = null; // 업로드 성공 후 "관리화면 열기" 대상
      var currentDetail = null; // { proposalId, title } — 상세(안 목록) 화면 대상
      var currentPages = null; // { proposalId, variantId, versionId, label } — 페이지 화면 대상

      // ---- 메시지/코드 ----
      var MSG = {
        NETWORK: "서버에 연결할 수 없습니다. 주소와 포트를 확인하세요.",
        INVALID_CREDENTIALS: "이메일 또는 비밀번호가 올바르지 않습니다.",
        FORBIDDEN: "편집 권한이 없습니다.",
        RATE_LIMITED: "요청이 많습니다. 잠시 후 다시 시도하세요.",
        VALIDATION_ERROR: "입력값을 확인하세요(형식/용량 25MB 초과 등).",
        UPLOAD_FAILED: "이미지 업로드에 실패했습니다.",
        UPLOAD_NETWORK: "이미지 업로드 중 네트워크 오류가 발생했습니다.",
        NO_VARIANT: "이 시안에 안(variant)이 없습니다.",
        NO_SELECTION: "내보낼 프레임을 먼저 선택하세요.",
        EXPORT_FAILED: "프레임 내보내기에 실패했습니다.",
      };
      function humanize(code) {
        return MSG[code] || "오류: " + code;
      }
      function joinUrl(base, path) {
        return String(base).replace(/\/+$/, "") + path;
      }

      // ---- cova API ----
      async function api(path, opts, auth, _retried) {
        opts = opts || {};
        var headers = { "Content-Type": "application/json" };
        if (auth && config.accessToken) headers["Authorization"] = "Bearer " + config.accessToken;
        if (opts.headers) for (var k in opts.headers) headers[k] = opts.headers[k];
        var res;
        try {
          res = await fetch(joinUrl(API_BASE, path), {
            method: opts.method || "GET",
            headers: headers,
            body: opts.body,
          });
        } catch (e) {
          throw new Error("NETWORK");
        }
        // 액세스 토큰 만료(401) → 리프레시 후 1회 재시도.
        if (res.status === 401 && auth && config.refreshToken && !_retried) {
          if (await tryRefresh()) return api(path, opts, auth, true);
        }
        var body = null;
        try {
          body = await res.json();
        } catch (e) {}
        if (!res.ok) throw new Error((body && body.error) || "HTTP_" + res.status);
        return body;
      }

      async function tryRefresh() {
        try {
          var res = await fetch(joinUrl(API_BASE, "/api/plugin/auth/refresh"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ refreshToken: config.refreshToken }),
          });
          if (!res.ok) return false;
          var j = await res.json();
          config.accessToken = j.accessToken;
          config.refreshToken = j.refreshToken;
          config.expiresAt = j.expiresAt;
          persist();
          return true;
        } catch (e) {
          return false;
        }
      }

      // 경로 헬퍼
      function pagesPath(pid, vid, verId) {
        return "/api/plugin/proposals/" + pid + "/variants/" + vid + "/versions/" + verId + "/pages";
      }
      function versionsPath(pid, vid) {
        return "/api/plugin/proposals/" + pid + "/variants/" + vid + "/versions";
      }
      function variantsPath(pid) {
        return "/api/plugin/proposals/" + pid + "/variants";
      }

      // ---- 선택 프레임 export 요청(메인 ↔ UI) ----
      function requestExport() {
        return new Promise(function (resolve, reject) {
          pendingExport = { resolve: resolve, reject: reject };
          toMain({ type: "export-selection" });
        });
      }
      function filesMeta(images) {
        return images.map(function (im) {
          return { contentType: im.contentType, size: im.bytes.byteLength };
        });
      }
      function confirmPages(uploads, images) {
        return uploads.map(function (u, i) {
          return {
            pageId: u.pageId,
            pageOrder: u.pageOrder,
            path: u.path,
            width: images[i].width,
            height: images[i].height,
          };
        });
      }
      // 이미지를 서명 URL(절대 URL, 토큰 포함)로 Supabase 에 직접 PUT.
      async function putToSignedUrl(signedUrl, img) {
        var res;
        try {
          res = await fetch(signedUrl, {
            method: "PUT",
            headers: {
              "content-type": img.contentType,
              "cache-control": "max-age=3600",
              "x-upsert": "false",
            },
            body: img.bytes,
          });
        } catch (e) {
          throw new Error("UPLOAD_NETWORK");
        }
        if (!res.ok) throw new Error("UPLOAD_FAILED");
      }
      async function uploadAll(uploads, images) {
        for (var i = 0; i < uploads.length; i++) {
          setStatus("업로드 중 " + (i + 1) + "/" + uploads.length + "…");
          await putToSignedUrl(uploads[i].signedUrl, images[i]);
        }
      }

      // export → fn(images) 공통 래퍼
      async function runUpload(label, fn) {
        if (busy) return;
        busy = true;
        hideOpen();
        updateControls();
        setStatus(label + " — 프레임 내보내는 중…");
        try {
          var images = await requestExport();
          if (!images.length) throw new Error("NO_SELECTION");
          await fn(images);
          setStatusOk(label + " 완료 ✓");
        } catch (e) {
          setStatus(humanize(e.message), true);
          toMain({ type: "notify", message: humanize(e.message), error: true });
        } finally {
          busy = false;
          updateControls();
        }
      }

      // ---- 새 시안 ----
      async function createNewProposal() {
        var title = $("title").value.trim();
        if (!title) {
          setStatus("제목을 입력하세요.", true);
          return;
        }
        await runUpload("새 시안 생성", async function (images) {
          var created = await api(
            "/api/plugin/proposals",
            { method: "POST", body: JSON.stringify({ title: title, files: filesMeta(images) }) },
            true,
          );
          await uploadAll(created.uploads, images);
          await api(
            pagesPath(created.proposalId, created.variantId, created.versionId),
            { method: "PUT", body: JSON.stringify({ pages: confirmPages(created.uploads, images) }) },
            true,
          );
          toMain({ type: "notify", message: "새 시안 “" + title + "” 생성됨" });
          $("title").value = "";
          listLoaded = false; // 다음에 기존 탭 열면 새로고침
          showOpen(created.proposalId);
        });
      }

      // ---- 기존 안(variant)에 새 버전 ----
      async function addVersionToVariant(proposalId, variantId, label) {
        await runUpload("안 " + label + " 새 버전", async function (images) {
          var ver = await api(
            versionsPath(proposalId, variantId),
            { method: "POST", body: JSON.stringify({ note: "" }) },
            true,
          );
          var issued = await api(
            pagesPath(proposalId, variantId, ver.versionId),
            { method: "POST", body: JSON.stringify({ files: filesMeta(images) }) },
            true,
          );
          await uploadAll(issued.uploads, images);
          await api(
            pagesPath(proposalId, variantId, ver.versionId),
            { method: "PUT", body: JSON.stringify({ pages: confirmPages(issued.uploads, images) }) },
            true,
          );
          toMain({ type: "notify", message: "안 " + label + " v" + ver.versionNo + " 업로드됨" });
          showOpen(proposalId);
          await refreshDetail();
        });
      }

      // ---- 기존 시안에 새 안(variant) 추가 ----
      async function addVariantToProposal(proposalId) {
        await runUpload("새 안 추가", async function (images) {
          var created = await api(
            variantsPath(proposalId),
            { method: "POST", body: JSON.stringify({ files: filesMeta(images) }) },
            true,
          );
          await uploadAll(created.uploads, images);
          await api(
            pagesPath(proposalId, created.variantId, created.versionId),
            { method: "PUT", body: JSON.stringify({ pages: confirmPages(created.uploads, images) }) },
            true,
          );
          toMain({ type: "notify", message: "새 안 " + created.label + " 추가됨" });
          showOpen(proposalId);
          await refreshDetail();
        });
      }

      // ---- 시안 목록 ----
      var searchTimer = null;
      async function loadProposals() {
        listLoaded = true;
        var q = $("search").value.trim();
        $("count").textContent = "";
        $("list").innerHTML = '<div class="loading">불러오는 중…</div>';
        try {
          var data = await api(
            "/api/plugin/proposals?pageSize=50&q=" + encodeURIComponent(q),
            {},
            true,
          );
          renderList(data.items || [], data.total || 0);
        } catch (e) {
          $("list").innerHTML = '<div class="empty">' + humanize(e.message) + "</div>";
        }
      }
      function renderList(items, total) {
        $("count").textContent = total + "개";
        if (!items.length) {
          $("list").innerHTML = '<div class="empty">시안이 없습니다.</div>';
          return;
        }
        $("list").innerHTML = "";
        items.forEach(function (it) {
          var row = document.createElement("div");
          row.className = "item clickable";
          var info = document.createElement("div");
          info.className = "info";
          var t = document.createElement("div");
          t.className = "title";
          t.textContent = it.title || "(제목 없음)";
          var m = document.createElement("div");
          m.className = "meta";
          var parts = [];
          if (it.domain) parts.push(it.domain);
          if (it.publicId) parts.push("/" + it.publicId);
          m.textContent = parts.join(" · ");
          info.appendChild(t);
          info.appendChild(m);
          var chev = document.createElement("div");
          chev.className = "chev";
          chev.textContent = "›";
          row.appendChild(info);
          row.appendChild(chev);
          row.addEventListener("click", function () {
            openDetail(it.id, it.title || "(제목 없음)");
          });
          $("list").appendChild(row);
        });
      }

      // ---- 시안 상세: 안(variant) 목록 ----
      function switchExistingView(which) {
        $("listView").classList.toggle("hidden", which !== "list");
        $("detailView").classList.toggle("hidden", which !== "detail");
        $("pagesView").classList.toggle("hidden", which !== "pages");
      }
      async function openDetail(proposalId, title) {
        currentDetail = { proposalId: proposalId, title: title };
        $("detailTitle").textContent = title;
        $("variants").innerHTML = '<div class="loading">불러오는 중…</div>';
        switchExistingView("detail");
        await loadDetail();
      }
      async function loadDetail() {
        try {
          var detail = await api("/api/plugin/proposals/" + currentDetail.proposalId, {}, true);
          renderVariants(detail.variants || []);
        } catch (e) {
          $("variants").innerHTML = '<div class="empty">' + humanize(e.message) + "</div>";
        }
      }
      async function refreshDetail() {
        if (currentDetail) await loadDetail();
      }
      function renderVariants(variants) {
        var c = $("variants");
        c.innerHTML = "";
        if (!variants.length) {
          c.innerHTML = '<div class="empty">안이 없습니다.</div>';
          return;
        }
        variants.forEach(function (v) {
          var label = v.label || v.slug || "?";
          var row = document.createElement("div");
          row.className = "item clickable";
          var info = document.createElement("div");
          info.className = "info";
          var t = document.createElement("div");
          t.className = "title";
          t.textContent = "안 " + label;
          var m = document.createElement("div");
          m.className = "meta";
          var pageCount = v.pages ? v.pages.length : 0;
          m.textContent = (v.versions ? v.versions.length : 0) + "개 버전 · 현재 " + pageCount + "장";
          info.appendChild(t);
          info.appendChild(m);
          var btn = document.createElement("button");
          btn.className = "sm needsSel";
          btn.textContent = "새 버전";
          btn.disabled = busy || selectionCount === 0;
          btn.addEventListener("click", function (e) {
            e.stopPropagation();
            addVersionToVariant(currentDetail.proposalId, v.id, label);
          });
          var chev = document.createElement("div");
          chev.className = "chev";
          chev.textContent = "›";
          row.appendChild(info);
          row.appendChild(btn);
          row.appendChild(chev);
          row.addEventListener("click", function () {
            openPages(v.id);
          });
          c.appendChild(row);
        });
      }

      // ---- 안 상세: 페이지(이미지) 목록 + 낱개 교체 ----
      async function openPages(variantId) {
        currentPages = {
          proposalId: currentDetail.proposalId,
          variantId: variantId,
          versionId: null,
          label: null,
        };
        $("pagesTitle").textContent = "페이지";
        $("pages").innerHTML = '<div class="loading">불러오는 중…</div>';
        switchExistingView("pages");
        await loadPages();
      }
      async function loadPages() {
        try {
          var detail = await api("/api/plugin/proposals/" + currentPages.proposalId, {}, true);
          var v = (detail.variants || []).filter(function (x) {
            return x.id === currentPages.variantId;
          })[0];
          if (!v) {
            $("pages").innerHTML = '<div class="empty">안을 찾을 수 없습니다.</div>';
            return;
          }
          currentPages.versionId = v.currentVersionId;
          currentPages.label = v.label || v.slug || "?";
          $("pagesTitle").textContent = "안 " + currentPages.label + " · 현재 버전";
          renderPages(v.pages || []);
        } catch (e) {
          $("pages").innerHTML = '<div class="empty">' + humanize(e.message) + "</div>";
        }
      }
      async function refreshPages() {
        if (currentPages) await loadPages();
      }
      function renderPages(pages) {
        var c = $("pages");
        c.innerHTML = "";
        if (!pages.length) {
          c.innerHTML = '<div class="empty">이미지가 없습니다.</div>';
          return;
        }
        pages.forEach(function (p, idx) {
          var row = document.createElement("div");
          row.className = "page";
          var img = document.createElement("img");
          if (p.url) img.src = p.url;
          img.onerror = function () {
            img.style.visibility = "hidden";
          };
          var info = document.createElement("div");
          info.className = "info";
          var t = document.createElement("div");
          t.className = "title";
          t.textContent = idx + 1 + "페이지";
          var m = document.createElement("div");
          m.className = "meta";
          m.textContent = (p.width || "?") + " × " + (p.height || "?");
          info.appendChild(t);
          info.appendChild(m);
          var btn = document.createElement("button");
          btn.className = "sm needsSel";
          btn.textContent = "교체";
          btn.disabled = busy || selectionCount === 0;
          btn.addEventListener("click", function () {
            replacePage(p.id, idx + 1);
          });
          row.appendChild(img);
          row.appendChild(info);
          row.appendChild(btn);
          c.appendChild(row);
        });
      }

      // 페이지 이미지 낱개 교체 — 선택한 첫 프레임을 사용한다.
      async function replacePage(pageId, ordinal) {
        await runUpload(ordinal + "페이지 교체", async function (images) {
          var img = images[0];
          if (!img) throw new Error("NO_SELECTION");
          var base = pagesPath(currentPages.proposalId, currentPages.variantId, currentPages.versionId);
          var issued = await api(
            base + "/" + pageId + "/replace",
            { method: "POST", body: JSON.stringify({ contentType: img.contentType, size: img.bytes.byteLength }) },
            true,
          );
          await putToSignedUrl(issued.signedUrl, img);
          await api(
            base + "/" + pageId,
            { method: "PUT", body: JSON.stringify({ path: issued.path, width: img.width, height: img.height }) },
            true,
          );
          toMain({ type: "notify", message: ordinal + "페이지 교체됨" });
          showOpen(currentPages.proposalId);
          await refreshPages();
        });
      }

      // ---- 화면/컨트롤 ----
      function showLogin() {
        $("login").classList.remove("hidden");
        $("app").classList.add("hidden");
      }
      function showApp() {
        $("login").classList.add("hidden");
        $("app").classList.remove("hidden");
        var u = config.user || {};
        $("userName").textContent = u.name || u.email || "";
        var editor = u.role === "editor" || u.role === "admin";
        $("roleWarn").classList.toggle("hidden", editor);
        updateControls();
      }
      function updateControls() {
        var has = selectionCount > 0;
        $("selbar").textContent = has
          ? "선택된 프레임: " + selectionCount + "개"
          : "Figma에서 올릴 프레임을 선택하세요";
        $("selbar").classList.toggle("has", has);
        $("createBtn").disabled = busy || !has || !$("title").value.trim();
        var btns = document.querySelectorAll(".needsSel");
        for (var i = 0; i < btns.length; i++) btns[i].disabled = busy || !has;
      }
      function setStatus(text, isErr) {
        var el = $("status");
        el.textContent = text || "";
        el.className = "status" + (isErr ? " err" : "");
      }
      function setStatusOk(text) {
        var el = $("status");
        el.textContent = text;
        el.className = "status ok";
      }
      function showOpen(proposalId) {
        lastProposalId = proposalId;
        $("openBtn").classList.toggle("hidden", !proposalId);
      }
      function hideOpen() {
        $("openBtn").classList.add("hidden");
      }
      function switchTab(which) {
        $("tabNewBtn").classList.toggle("active", which === "new");
        $("tabExistingBtn").classList.toggle("active", which === "existing");
        $("viewNew").classList.toggle("hidden", which !== "new");
        $("viewExisting").classList.toggle("hidden", which !== "existing");
        if (which === "existing") {
          switchExistingView("list");
          if (!listLoaded) loadProposals();
        }
      }

      // ---- 로그인/로그아웃 ----
      async function doLogin() {
        $("loginErr").textContent = "";
        var email = $("email").value.trim();
        var password = $("password").value;
        if (!email || !password) {
          $("loginErr").textContent = "이메일과 비밀번호를 입력하세요.";
          return;
        }
        $("loginBtn").disabled = true;
        $("loginBtn").textContent = "로그인 중…";
        try {
          var data = await api("/api/plugin/auth/login", {
            method: "POST",
            body: JSON.stringify({ email: email, password: password }),
          });
          config.accessToken = data.accessToken;
          config.refreshToken = data.refreshToken;
          config.expiresAt = data.expiresAt;
          config.user = data.user;
          persist();
          showApp();
        } catch (e) {
          $("loginErr").textContent = humanize(e.message);
        } finally {
          $("loginBtn").disabled = false;
          $("loginBtn").textContent = "로그인";
        }
      }
      function doLogout() {
        config.accessToken = null;
        config.refreshToken = null;
        config.expiresAt = null;
        config.user = null;
        persist();
        listLoaded = false;
        currentDetail = null;
        currentPages = null;
        switchExistingView("list");
        $("list").innerHTML = "";
        $("count").textContent = "";
        setStatus("");
        hideOpen();
        showLogin();
      }

      // ---- 이벤트 ----
      $("loginBtn").addEventListener("click", doLogin);
      $("signupLink").addEventListener("click", function (e) {
        e.preventDefault();
        toMain({ type: "open-url", url: joinUrl(API_BASE, "/signup") });
      });
      $("password").addEventListener("keydown", function (e) {
        if (e.key === "Enter") doLogin();
      });
      $("logoutBtn").addEventListener("click", doLogout);
      $("tabNewBtn").addEventListener("click", function () {
        switchTab("new");
      });
      $("tabExistingBtn").addEventListener("click", function () {
        switchTab("existing");
      });
      $("createBtn").addEventListener("click", createNewProposal);
      $("openBtn").addEventListener("click", function () {
        if (lastProposalId)
          toMain({ type: "open-url", url: joinUrl(API_BASE, "/studio/proposals/" + lastProposalId) });
      });
      $("title").addEventListener("input", updateControls);
      $("refreshBtn").addEventListener("click", loadProposals);
      $("backBtn").addEventListener("click", function () {
        currentDetail = null;
        switchExistingView("list");
      });
      $("pagesBackBtn").addEventListener("click", function () {
        currentPages = null;
        switchExistingView("detail");
      });
      $("addVariantBtn").addEventListener("click", function () {
        if (currentDetail) addVariantToProposal(currentDetail.proposalId);
      });
      $("search").addEventListener("input", function () {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(loadProposals, 300);
      });

      // ---- 메인에서 오는 메시지 ----
      onmessage = function (event) {
        var msg = event.data.pluginMessage;
        if (!msg) return;
        if (msg.type === "init") {
          if (msg.session) config = Object.assign(config, msg.session);
          if (config.accessToken && config.user) showApp();
          else showLogin();
        } else if (msg.type === "selection") {
          selectionCount = msg.count || 0;
          updateControls();
        } else if (msg.type === "export-result") {
          if (pendingExport) {
            pendingExport.resolve(msg.images || []);
            pendingExport = null;
          }
        } else if (msg.type === "export-error") {
          if (pendingExport) {
            pendingExport.reject(new Error("EXPORT_FAILED"));
            pendingExport = null;
          }
        }
      };

      // 핸들러 등록이 끝났으니 메인에 저장된 세션을 요청한다(race 방지 pull).
      toMain({ type: "ready" });
    </script>
  </body>
</html>
